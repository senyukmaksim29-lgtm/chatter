<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід • Chatter</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #004d2b, #008f52);
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .login-container {
            background: rgba(0, 40, 20, 0.95);
            padding: 50px 60px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 2px solid #00ff88;
        }

        h2 {
            color: #00ff88;
            font-size: 2.8rem;
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 40px;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .btn-large {
            width: 100%;
            padding: 18px;
            font-size: 1.4rem;
            font-weight: bold;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-large:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.35;
        }
    </style>
</head>
<body>

    <img src="https://i.pinimg.com/originals/2e/c8/1e/2ec81e1517a75592dd347207fa748d78.gif" class="video-bg" alt="background">

    <div class="login-container">
        <h2>CHATTER</h2>
        <p>Натисни, щоб увійти в чат</p>
        <button id="login-btn" class="btn-large">Увійти</button>
    </div>

    <script>
        document.getElementById('login-btn').addEventListener('click', function() {
            // Перехід на сторінку з формою (введення ніку і номера)
            window.location.href = '../chat/index.html';
        });
    </script>

</body>
</html>
