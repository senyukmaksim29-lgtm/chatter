<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат переписка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <div id="chat-window">
            <div class="message bot">
                Привіт! Я твій інтерактивний помічник. Обери фразу знизу, щоб розпочати діалог! 👇
            </div>
        </div>

        <div id="quick-replies">
            <button class="reply-btn" data-reply="Привіт! Як справи?">👋 Привіт!</button>
            <button class="reply-btn" data-reply="Який сьогодні день?">📅 Котрий день?</button>
            <button class="reply-btn" data-reply="Розкажи анекдот!">😂 Анекдот</button>
            <button class="reply-btn" data-reply="Які ігри порадиш?">🎮 Порадь гру</button>
            <button class="reply-btn" data-reply="Розкажи цікавий факт!">🤓 Цікавий факт</button>
            <button class="reply-btn" data-reply="Хто ти такий?">🤖 Хто ти?</button>
            <button class="reply-btn" data-reply="Дай пораду на день">💡 Порада дня</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
